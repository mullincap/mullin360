<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mullin Loading Screen — Architectural</title>
  <style>
    :root {
      --bg: #0f6031;
      --fg: rgba(255, 255, 255, 0.96);
      --muted: rgba(255, 255, 255, 0.58);
      --soft: rgba(255, 255, 255, 0.10);
      --line: rgba(255, 255, 255, 0.16);
      --line-strong: rgba(255, 255, 255, 0.32);
      --glow: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(0,0,0,0.08)),
        var(--bg);
    }

    /* Architectural field lines */
    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(90deg, transparent 11%, rgba(255,255,255,0.035) 11.05%, transparent 11.1%),
        linear-gradient(90deg, transparent 24%, rgba(255,255,255,0.025) 24.05%, transparent 24.1%),
        linear-gradient(90deg, transparent 76%, rgba(255,255,255,0.025) 76.05%, transparent 76.1%),
        linear-gradient(90deg, transparent 89%, rgba(255,255,255,0.035) 89.05%, transparent 89.1%),
        linear-gradient(0deg, transparent 18%, rgba(255,255,255,0.02) 18.05%, transparent 18.1%),
        linear-gradient(0deg, transparent 82%, rgba(255,255,255,0.02) 82.05%, transparent 82.1%);
      opacity: 0.9;
    }

    body::after {
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.05), transparent 28%);
      animation: ambientPulse 5.5s ease-in-out infinite;
    }

    .stage {
      position: relative;
      width: min(88vw, 780px);
      min-height: min(78vh, 760px);
      display: grid;
      place-items: center;
      padding: 56px 32px;
      isolation: isolate;
    }

    .frame {
      position: relative;
      width: min(72vw, 440px);
      aspect-ratio: 0.9 / 1;
      display: grid;
      place-items: center;
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .frame::before {
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      opacity: 0.7;
    }

    .frame::after {
      inset: 10% 6%;
      border-top: 1px solid rgba(255,255,255,0.12);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      opacity: 0.7;
    }

    .measure {
      position: absolute;
      left: 50%;
      top: 5%;
      width: min(58vw, 520px);
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.20) 16%,
        rgba(255,255,255,0.20) 84%,
        transparent 100%);
      opacity: 0.65;
    }

    .measure.bottom {
      top: auto;
      bottom: 5%;
    }

    .measure::before,
    .measure::after {
      content: "";
      position: absolute;
      top: -5px;
      width: 1px;
      height: 11px;
      background: rgba(255,255,255,0.30);
    }

    .measure::before { left: 16%; }
    .measure::after { right: 16%; }

    .logo-wrap {
      position: relative;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 34px 0;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      inset: 18% 14%;
      border: 1px solid rgba(255,255,255,0.08);
      opacity: 0.8;
      transform: scaleY(0.98);
    }

    .logo {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      height: auto;
      display: block;
      filter: drop-shadow(0 18px 36px rgba(0,0,0,0.18));
      animation: logoRise 3.8s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: none;
    }

    .scan {
      position: absolute;
      inset: 12% 18%;
      z-index: 3;
      overflow: hidden;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .scan::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: -28%;
      height: 28%;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.04) 32%,
        rgba(255,255,255,0.14) 50%,
        rgba(255,255,255,0.04) 68%,
        rgba(255,255,255,0) 100%
      );
      filter: blur(4px);
      animation: scanDown 3.6s cubic-bezier(.48,.04,.22,.96) infinite;
    }

    .meta {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: min(76vw, 360px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .progress {
      position: relative;
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .progress::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg,
          transparent 0%,
          rgba(255,255,255,0.75) 48%,
          transparent 100%);
      width: 34%;
      animation: lineTravel 2.8s cubic-bezier(.55,.08,.24,.98) infinite;
      box-shadow: 0 0 24px rgba(255,255,255,0.18);
    }

    .corners span {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(255,255,255,0.28);
      border-style: solid;
      pointer-events: none;
    }

    .corners .tl { top: 0; left: 0; border-width: 1px 0 0 1px; }
    .corners .tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
    .corners .bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
    .corners .br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

    @keyframes ambientPulse {
      0%, 100% { opacity: 0.82; }
      50% { opacity: 1; }
    }

    @keyframes logoRise {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes scanDown {
      0% { transform: translateY(-130%); opacity: 0; }
      12% { opacity: 1; }
      55% { opacity: 1; }
      100% { transform: translateY(430%); opacity: 0; }
    }

    @keyframes lineTravel {
      0% { transform: translateX(-135%); }
      100% { transform: translateX(395%); }
    }

    @media (max-width: 640px) {
      .stage { padding: 38px 22px; min-height: 100vh; }
      .frame { width: min(84vw, 360px); }
      .logo { max-width: 320px; }
      .meta { width: min(82vw, 300px); bottom: 7%; }
      .label { font-size: 9px; letter-spacing: 0.28em; }
      .measure { width: min(70vw, 360px); }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Loading screen">
    <div class="measure"></div>
    <div class="measure bottom"></div>

    <section class="frame">
      <div class="corners" aria-hidden="true">
        <span class="tl"></span>
        <span class="tr"></span>
        <span class="bl"></span>
        <span class="br"></span>
      </div>

      <div class="logo-wrap">
        <div class=""></div>
        <img class="logo" src="white-full.png" alt="Mullin Development Company logo" />
      </div>
    </section>

    <div class="meta" aria-hidden="true">
      <div class="label">Preparing Experience</div>
      <div class="progress"></div>
    </div>
  </main>
</body>
</html>
