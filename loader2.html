<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mullin Loading Screen</title>
  <style>
    :root {
      --bg: #0f6031;
      --fg: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.58);
      --line: rgba(255,255,255,0.16);
      --line-fill: rgba(255,255,255,0.88);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      color: var(--fg);
    }

    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 38%, rgba(255,255,255,0.05), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06)),
        var(--bg);
    }

    .wrap {
      width: min(88vw, 520px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      text-align: center;
      animation: fadeIn 1.2s ease-out both;
    }

    .logo-shell {
      position: relative;
      width: min(54vw, 280px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }

    .logo-shell::after {
      content: "";
      position: absolute;
      inset: 18% 10% 8%;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
      filter: blur(18px);
      opacity: 0.5;
      z-index: 0;
      animation: breathe 3.8s ease-in-out infinite;
    }

    .logo {
      position: relative;
      z-index: 1;
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 14px 36px rgba(0, 0, 0, 0.18));
      animation: float 3.8s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: none;
    }

    .meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: min(78vw, 320px);
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .progress {
      position: relative;
      width: 100%;
      height: 1px;
      background: var(--line);
      overflow: hidden;
    }

    .progress::after {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 42%;
      background: linear-gradient(90deg, rgba(255,255,255,0), var(--line-fill), rgba(255,255,255,0));
      animation: sweep 2.2s cubic-bezier(.55, .08, .26, .98) infinite;
      box-shadow: 0 0 18px rgba(255,255,255,0.18);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.32; transform: scale(0.98); }
      50% { opacity: 0.56; transform: scale(1.03); }
    }

    @keyframes sweep {
      0% { transform: translateX(-130%); }
      100% { transform: translateX(350%); }
    }

    @media (max-width: 560px) {
      .wrap { gap: 22px; }
      .logo-shell { width: min(64vw, 240px); }
      .meta { width: min(82vw, 280px); }
      .label { letter-spacing: 0.28em; font-size: 10px; }
    }
  </style>
</head>
<body>
  <main class="wrap" aria-label="Loading screen">
    <div class="logo-shell">
      <img class="logo" src="white-full.png" alt="Mullin Development Company logo" />
    </div>

    <div class="meta" aria-hidden="true">
      <div class="label">Loading</div>
      <div class="progress"></div>
    </div>
  </main>
</body>
</html>
